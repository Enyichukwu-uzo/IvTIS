
{% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f5f0;
            overflow-x: hidden;
        }

        /* ----- Hero Section (original structure enhanced) ----- */
        .hero {
            position: relative;
            min-height: 100vh;
            background: #212324;
            display: flex;
            align-items: center;
            text-align: center;
            color: white;
            padding: 4rem 0;
            z-index: 1;
            overflow: hidden;
        }

        .hero::before {
            content: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.55) 20%);
            z-index: 1;
            pointer-events: none;
        }

        /* Background slideshow container (full coverage) */
        .hero .bg-slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .hero .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            opacity: 0;
            animation: bgFadeSwap 25s infinite ease-in-out;
            transform: scale(1);
            transition: transform 0.3s;
        }

        /* 5 unique background images using high-quality unsplash / school theme placeholders 
           (Free to use, represent international school atmosphere) */
        .hero .slide:nth-child(1) {
            background-image: url("{% static 'images/hero/school-campus-1.jpeg' %}");
            animation-delay: 0s;
        }
        .hero .slide:nth-child(2) {
            background-image: url("{% static 'images/hero/graduation-5.jpeg' %}");
            animation-delay: 5s;
        }
        .hero .slide:nth-child(3) {
            background-image: url("{% static 'images/hero/classroom-activity-3.jpeg' %}");
            animation-delay: 10s;
        }
        .hero .slide:nth-child(4) {
            background-image: url("{% static 'images/hero/school_compound.png' %}");
            animation-delay: 15s;
        }
        .hero .slide:nth-child(5) {
            background-image: url("{% static 'images/hero/sports-day-4.jpeg' %}");
            animation-delay: 20s;
        }

        @keyframes bgFadeSwap {
            0% { opacity: 0; transform: scale(1.02);}
            8% { opacity: 1; transform: scale(1.02);}
            20% { opacity: 1; transform: scale(1);}
            28% { opacity: 0; transform: scale(1);}
            100% { opacity: 0; transform: scale(1.02);}
        }

        /* Hero text overlay with better contrast */
        .hero .container {
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            margin: 0 auto;
        }
    </style>
    <section class="hero d-flex align-items-center text-center text-white">
        <div class="bg-slideshow">
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
        </div>
        
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <h1 class="display-3 fw-bold mb-2 font-heading">Ivory Tower International School</h1>
                    <p class="lead mb-3 fst-italic">Excellence & Wisdom</p>
                    <p class="h5 mb-4">A world-class international education from Early Years to Senior School.</p>
                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                        <a href="#" class="btn btn-accent btn-lg px-5 py-2">Book a Visit</a>
                        <a href="#" class="btn btn-outline-light btn-lg px-5 py-2">
                            Request a Prospectus
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
