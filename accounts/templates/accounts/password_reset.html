{% extends "accounts/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="font-heading text-primary mb-4 text-center">Reset Password</h2>
                    <p class="text-muted mb-4">Enter your email address below, and we'll send you a link to reset your password.</p>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email address</label>
                            <input type="email" name="email" class="form-control" id="id_email" required>
                            {% if form.email.errors %}
                                <div class="text-danger small">{{ form.email.errors|striptags }}</div>
                            {% endif %}
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                    <p class="mt-3 text-center">
                        <a href="{% url 'accounts:login' %}">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
