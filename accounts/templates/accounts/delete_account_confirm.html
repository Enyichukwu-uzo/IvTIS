<!-- accounts/templates/accounts/delete_account_confirm.html -->
{% extends "core/base.html" %}

{% block content %}
<section class="py-5">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card border-danger shadow-sm">
          <div class="card-body p-5">
            <i class="bi bi-exclamation-triangle-fill fs-1 text-danger mb-3 d-block"></i>
            <h2 class="font-heading">Delete Your Account?</h2>
            <p class="text-muted">This action is permanent and cannot be undone. All your data will be removed.</p>
            <form method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-danger btn-lg">Yes, Delete My Account</button>
              <a href="{% url 'accounts:user_profile' %}" class="btn btn-outline-secondary btn-lg ms-2">Cancel</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
