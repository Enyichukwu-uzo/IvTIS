{% extends "accounts/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-envelope-check fs-1 text-accent mb-3 d-block"></i>
                    <h2 class="font-heading text-primary mb-3">Check Your Email</h2>
                    <p class="text-muted">We've sent you an email with a link to reset your password. If you don't see it, check your spam folder.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Return to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
