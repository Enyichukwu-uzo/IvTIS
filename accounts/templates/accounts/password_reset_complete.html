{% extends "accounts/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-check-circle-fill fs-1 text-success mb-3 d-block"></i>
                    <h2 class="font-heading text-primary mb-3">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been set. You may now log in with your new password.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
