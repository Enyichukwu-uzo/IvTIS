{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Staff Registration</h2>
    <p>Your account will require approval by a school administrator before you can log in.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>
{% endblock %}
